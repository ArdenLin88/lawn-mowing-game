<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>割草遊戲 V2 - 骷髏大亂鬥</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Pirata+One&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { touch-action: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    body {
      background: #1A1612;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'IM Fell English', Georgia, serif;
    }
    #wrapper {
      position: relative;
      max-width: 100vw;
      max-height: 100vh;
    }
    canvas {
      display: block;
      border: 1px solid #7A6A52;
      box-shadow: 4px 4px 0 #2A231C;
      max-width: 100vw;
      max-height: 100vh;
      touch-action: none;
    }

    /* 觸控裝置：移除邊框 / 陰影，讓畫面貼到螢幕兩側 */
    @media (hover: none) and (pointer: coarse) {
      canvas {
        border: none;
        box-shadow: none;
      }
    }

    /* ── 虛擬搖桿（手機 / 觸控裝置）── */
    .joystick {
      position: fixed;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(42, 35, 28, 0.6);
      border: 1px solid rgba(122, 106, 82, 0.85);
      box-shadow: 2px 2px 0 rgba(10, 8, 6, 0.5);
      touch-action: none;
      z-index: 50;
      display: none;
      pointer-events: auto;
    }
    .joystick.visible { display: block; }
    .joystick-knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 42px;
      height: 42px;
      margin-left: -21px;
      margin-top: -21px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #E8DCC4, #7A6A52 70%, #2A231C);
      border: 1px solid rgba(232, 220, 196, 0.5);
      pointer-events: none;
    }
    .joystick.aim {
      border-color: rgba(200, 148, 26, 0.85);
    }
    .joystick.aim .joystick-knob {
      background: radial-gradient(circle at 35% 30%, #C8941A, #7B1A1A 75%, #1A1612);
    }
    /* 搖桿固定在 viewport 兩側角落，避開 iOS Safari home indicator */
    #joystick-left  { left: 16px;  bottom: max(20px, env(safe-area-inset-bottom, 20px)); }
    #joystick-right { right: 16px; bottom: max(20px, env(safe-area-inset-bottom, 20px)); }

    /* 窄螢幕：升級選單卡片改為折行＋縮小 */
    @media (max-width: 600px) {
      #skill-cards-container { flex-wrap: wrap; gap: 10px; justify-content: center; padding: 0 10px; }
      .skill-card { width: 140px; min-height: 180px; padding: 14px 10px 12px; }
      .card-icon { font-size: 32px; }
      .card-name { font-size: 14px; }
      #upgrade-title { font-size: 26px; }
    }

    /* ── 直立旋轉提示遮罩（只在觸控裝置 + 直立時顯示）── */
    #rotate-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #0a0f0a;
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #88FFCC;
      font-family: 'Arial', sans-serif;
      padding: 20px;
      text-align: center;
    }
    #rotate-overlay .icon {
      font-size: 80px;
      animation: rotateHint 1.6s ease-in-out infinite;
      margin-bottom: 24px;
    }
    #rotate-overlay .title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #C8941A;  /* xp-glow */
    }
    #rotate-overlay .desc {
      font-size: 14px;
      color: #7A6A52;  /* muted */
      max-width: 320px;
      line-height: 1.6;
    }
    @keyframes rotateHint {
      0%, 100% { transform: rotate(0deg); }
      50%      { transform: rotate(-90deg); }
    }
    @media (hover: none) and (pointer: coarse) and (orientation: portrait) {
      #rotate-overlay { display: flex; }
    }

    /* ── 升級選單 overlay ── */
    #upgrade-overlay {
      display: none;
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(26, 22, 18, 0.78);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      animation: overlayIn 0.25s ease-out;
    }
    @keyframes overlayIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    #upgrade-title {
      color: #C8941A;
      font-family: 'Pirata One', cursive;
      font-size: 42px;
      font-weight: 400;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }
    #upgrade-subtitle {
      color: #7A6A52;
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 16px;
      margin-bottom: 28px;
    }
    #skill-cards-container {
      display: flex;
      gap: 20px;
    }
    .skill-card {
      position: relative;
      width: 160px;
      min-height: 210px;
      background: #2A231C;
      border: 1px solid #7A6A52;
      padding: 20px 14px 16px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      box-shadow: 4px 4px 0 #1A1612;
      animation: cardIn 0.3s ease-out both;
    }
    .skill-card:nth-child(1) { animation-delay: 0.05s; }
    .skill-card:nth-child(2) { animation-delay: 0.12s; }
    .skill-card:nth-child(3) { animation-delay: 0.19s; }
    @keyframes cardIn {
      from { transform: translateY(30px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .skill-card:hover {
      transform: translate(-1px, -1px);
      border-color: #E8DCC4;
      box-shadow: 5px 5px 0 #1A1612;
    }
    /* Rarity 線條密度（DESIGN.md 核心 RISK：用線條而非顏色） */
    /* .common 用 .skill-card 預設細線單框，不需另外宣告 */
    .skill-card.rare {
      border: 2px double #E8DCC4;
      position: relative;
    }
    .skill-card.rare::before, .skill-card.rare::after {
      content: "❦";
      position: absolute;
      color: #7A6A52;
      font-size: 14px;
      top: 4px;
      pointer-events: none;
    }
    .skill-card.rare::before { left: 8px; }
    .skill-card.rare::after  { right: 8px; }
    .skill-card.legendary {
      border: 1px solid #E8DCC4;
      outline: 1px solid #E8DCC4;
      outline-offset: 4px;
      position: relative;
    }
    .skill-card.legendary::before, .skill-card.legendary::after {
      content: "☠";
      position: absolute;
      color: #E8DCC4;
      font-size: 18px;
      top: 8px;
      pointer-events: none;
    }
    .skill-card.legendary::before { left: 12px; }
    .skill-card.legendary::after  { right: 12px; transform: scaleX(-1); }
    /* maxed 邊框色覆蓋 rarity 邊框色 */
    .skill-card.maxed {
      border-color: #C8941A;
    }
    .skill-card.legendary.maxed {
      border-color: #C8941A;
      outline-color: #C8941A;
    }
    .skill-card.maxed:hover {
      border-color: #C8941A;
      box-shadow: 5px 5px 0 #1A1612, inset 0 0 0 1px #C8941A;
    }
    /* Double upgrade（雙倍升級）— 跟 rarity 正交，覆蓋邊框色，不影響角飾 */
    .skill-card.double {
      border: 2px solid #E8C44A;
      outline: 1px solid #C8941A;
      outline-offset: 2px;
    }
    .skill-card.double:hover {
      border-color: #E8C44A;
      box-shadow: 5px 5px 0 #1A1612, inset 0 0 0 1px #E8C44A;
    }
    .card-double-badge {
      position: absolute;
      top: -10px;
      right: -10px;
      width: 32px;
      height: 32px;
      background: #C8941A;
      color: #1A1612;
      font-family: 'Pirata One', cursive;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #E8DCC4;
      box-shadow: 2px 2px 0 #1A1612;
      z-index: 2;
    }
    /* 確保 container 不裁切徽章 */
    #skill-cards-container { overflow: visible; }
    .card-icon   { font-size: 40px; line-height: 1; color: #E8DCC4; }
    .card-name   { color: #E8DCC4; font-family: 'Pirata One', cursive; font-size: 20px; font-weight: 400; letter-spacing: 0.03em; }
    .card-level  { color: #C8941A; font-family: 'IM Fell English', serif; font-size: 13px; font-style: italic; }
    .card-desc   { color: #7A6A52; font-family: 'IM Fell English', serif; font-size: 13px; line-height: 1.45; flex: 1; }
    .card-rarity { color: #7A6A52; font-family: 'IM Fell English', serif; font-size: 10px; letter-spacing: 0.2em; padding-top: 6px; margin-top: auto; border-top: 1px solid #7A6A52; width: 100%; }
  </style>
</head>
<body>
<!-- 直立模式旋轉提示（觸控裝置且直立時自動顯示，由 CSS @media 控制）-->
<div id="rotate-overlay">
  <div class="icon">📱</div>
  <div class="title">請旋轉手機至橫向</div>
  <div class="desc">本遊戲需橫向遊玩，旋轉裝置後即可繼續</div>
</div>

<div id="wrapper">
  <canvas id="gameCanvas"></canvas>

  <!-- 虛擬搖桿（觸控裝置自動顯示）-->
  <div id="joystick-left" class="joystick"><div class="joystick-knob"></div></div>
  <div id="joystick-right" class="joystick aim"><div class="joystick-knob"></div></div>

  <!-- 升級選單 -->
  <div id="upgrade-overlay">
    <div id="upgrade-title">⬆ LEVEL UP! ⬆</div>
    <div id="upgrade-subtitle">選擇一項技能</div>
    <div id="skill-cards-container"></div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 1100;
canvas.height = 600;

// 修正：roundRect 不會自動 beginPath，會讓 sub-path 累積導致每幀 fill 把所有 HUD 框框
// 用最後一次的 fillStyle 填過去（症狀：HUD 全部變藍色）。改寫讓它自動開新 path。
(function patchRoundRect() {
  const orig = CanvasRenderingContext2D.prototype.roundRect;
  CanvasRenderingContext2D.prototype.roundRect = function (...args) {
    this.beginPath();
    return orig.apply(this, args);
  };
})();

// ─────────────────────────────────────────
// Design System Tokens（對應 DESIGN.md「雕版 × 鬼火」）
// 80% 畫面只用 bg/surface/ink/muted；飽和色配給制
// ─────────────────────────────────────────
const COLORS = {
  bg:      '#1A1612', // 羊皮夜：主背景，永不純黑
  surface: '#2A231C', // 羊皮陰影：卡片、面板
  ink:     '#E8DCC4', // 橡膽墨：所有文字、線條，永不純白
  muted:   '#7A6A52', // 蝕紙黃：次要、停用、格線
  hero:    '#6E7480', // 冷鐵：騎士主角
  enemy:   '#D4C8A8', // 骨粉：骷髏
  blood:   '#7B1A1A', // 牛血：HP、傷害、屍跡
  xp:      '#C8941A', // 聖物金：XP、升級、稀有
  crit:    '#5FA89C', // 鬼火青：爆擊、魔法
  warning: '#C44B1A', // 灰燼橘：低血邊緣
};
const FONTS = {
  display: '"Pirata One", cursive',  // 標題、升級、傷害大字
  body:    '"IM Fell English", serif', // HUD 標籤、技能描述、tooltip
};

// ─────────────────────────────────────────
// 古堡幽靈背景音樂（Web Audio API 程序式合成）
// ─────────────────────────────────────────
const BGM = (() => {
  let ctx = null;
  let masterGain = null;
  let isPlaying = false;
  let scheduledNodes = [];
  let droneNodes = [];
  let nextNoteTime = 0;
  let scheduleAhead = 0.1;
  let scheduleInterval = null;
  let currentTempo = 0.38; // 秒/拍（加快節奏）

  // A 小調音階頻率（提高 4 個半音，×1.2599）
  const NOTES = {
    A3: 277.18, B3: 311.13, C4: 329.63, D4: 369.99,
    E4: 415.30, F4: 440.00, G4: 493.88, A4: 554.37,
    C5: 659.26, E5: 830.61,
  };

  // 幽靈旋律序列（A 自然小調）
  const MELODY = [
    { note: 'A3', dur: 2.4, vel: 0.18 },
    { note: 'C4', dur: 0.8, vel: 0.14 },
    { note: 'E4', dur: 1.2, vel: 0.16 },
    { note: 'D4', dur: 0.8, vel: 0.12 },
    { note: 'F4', dur: 1.6, vel: 0.15 },
    { note: 'E4', dur: 0.8, vel: 0.11 },
    { note: 'C4', dur: 1.6, vel: 0.13 },
    { note: 'A3', dur: 0.8, vel: 0.10 },
    { note: 'G4', dur: 2.0, vel: 0.14 },
    { note: 'E4', dur: 0.8, vel: 0.12 },
    { note: 'A4', dur: 1.6, vel: 0.17 },
    { note: 'G4', dur: 0.8, vel: 0.11 },
    { note: 'E4', dur: 2.4, vel: 0.14 },
    { note: 'D4', dur: 1.2, vel: 0.12 },
    { note: 'C4', dur: 1.6, vel: 0.15 },
    { note: 'B3', dur: 2.0, vel: 0.10 },
  ];
  let melodyIdx = 0;

  function ensureCtx() {
    if (!ctx) {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain();
      masterGain.gain.setValueAtTime(0.0, ctx.currentTime);
      masterGain.connect(ctx.destination);
    }
    if (ctx.state === 'suspended') ctx.resume();
  }

  function playOrganNote(freq, startTime, duration, velocity) {
    const osc1 = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    const osc3 = ctx.createOscillator();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();

    osc1.type = 'sine';   osc1.frequency.value = freq;
    osc2.type = 'sine';   osc2.frequency.value = freq * 2;    // 八度泛音
    osc3.type = 'triangle'; osc3.frequency.value = freq * 3;  // 五度泛音

    const g1 = ctx.createGain(); g1.gain.value = velocity;
    const g2 = ctx.createGain(); g2.gain.value = velocity * 0.4;
    const g3 = ctx.createGain(); g3.gain.value = velocity * 0.15;

    filter.type = 'lowpass';
    filter.frequency.value = 1200;
    filter.Q.value = 0.8;

    osc1.connect(g1); g1.connect(gain);
    osc2.connect(g2); g2.connect(gain);
    osc3.connect(g3); g3.connect(gain);
    gain.connect(filter);
    filter.connect(masterGain);

    // 弱起音淡入、尾音淡出
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(1, startTime + 0.12);
    gain.gain.setValueAtTime(1, startTime + duration - 0.3);
    gain.gain.linearRampToValueAtTime(0, startTime + duration);

    osc1.start(startTime); osc1.stop(startTime + duration);
    osc2.start(startTime); osc2.stop(startTime + duration);
    osc3.start(startTime); osc3.stop(startTime + duration);
    scheduledNodes.push(osc1, osc2, osc3);
  }

  function startDrone() {
    // 低沉持續音（A1 + E2）產生古堡氛圍
    const drone1 = ctx.createOscillator();
    const drone2 = ctx.createOscillator();
    const dGain = ctx.createGain();
    const dFilter = ctx.createBiquadFilter();
    const tremolo = ctx.createOscillator();
    const tremoloGain = ctx.createGain();

    drone1.type = 'sine';    drone1.frequency.value = 69.3;  // C#2（提高 4 半音）
    drone2.type = 'triangle'; drone2.frequency.value = 103.8; // G#2（提高 4 半音）

    dFilter.type = 'lowpass'; dFilter.frequency.value = 400;
    dGain.gain.value = 0.22;

    // 顫音效果（慢慢震盪，幽靈感）
    tremolo.type = 'sine'; tremolo.frequency.value = 0.15;
    tremoloGain.gain.value = 0.06;
    tremolo.connect(tremoloGain);
    tremoloGain.connect(dGain.gain);

    drone1.connect(dGain); drone2.connect(dGain);
    dGain.connect(dFilter); dFilter.connect(masterGain);
    tremolo.start(); drone1.start(); drone2.start();
    droneNodes = [drone1, drone2, dGain, tremolo];
  }

  function scheduleMelody() {
    while (nextNoteTime < ctx.currentTime + scheduleAhead * 2) {
      const step = MELODY[melodyIdx % MELODY.length];
      playOrganNote(NOTES[step.note], nextNoteTime, step.dur * currentTempo * 0.85, step.vel);
      nextNoteTime += step.dur * currentTempo;
      melodyIdx++;
    }
  }

  return {
    start() {
      if (isPlaying) return;
      ensureCtx();
      isPlaying = true;
      nextNoteTime = ctx.currentTime + 0.1;
      startDrone();
      // 淡入
      masterGain.gain.cancelScheduledValues(ctx.currentTime);
      masterGain.gain.linearRampToValueAtTime(0.7, ctx.currentTime + 2.0); // 音量降低 30%
      scheduleInterval = setInterval(() => scheduleMelody(), 80);
      scheduleMelody();
    },
    stop() {
      if (!isPlaying) return;
      isPlaying = false;
      clearInterval(scheduleInterval);
      if (masterGain) {
        masterGain.gain.cancelScheduledValues(ctx.currentTime);
        masterGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 1.5);
      }
      setTimeout(() => {
        droneNodes.forEach(n => { try { n.stop && n.stop(); n.disconnect && n.disconnect(); } catch(e){} });
        droneNodes = [];
        scheduledNodes.forEach(n => { try { n.disconnect && n.disconnect(); } catch(e){} });
        scheduledNodes = [];
        melodyIdx = 0;
      }, 1600);
    },
    setVolume(v) {
      if (masterGain) masterGain.gain.setTargetAtTime(v, ctx.currentTime, 0.3);
    },
    isRunning() { return isPlaying; }
  };
})();

// ─────────────────────────────────────────
// 遊戲狀態
// ─────────────────────────────────────────
let state = 'start'; // 'start' | 'playing' | 'upgrade' | 'gameover' | 'victory'
let score = 0;
let killCount = 0;
let frameCount = 0;
let spawnTimer = 0;
let spawnInterval = 110;

// V3 新增全域
let gameTime = 0;            // 遊戲計時（frames）
let arrows = [];             // 箭矢陣列
let evolutionAnnouncements = []; // 武器進化公告

// 大魔王系統
let bossSpawned = false;
let bossDefeated = false;
let bossRevived = false;   // 大魔王死後復活一次旗標

// ─────────────────────────────────────────
// 音效系統（Web Audio API，無需外部音效檔）
// ─────────────────────────────────────────
const SFX = (() => {
  let _ctx = null;
  function ac() {
    if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
    return _ctx;
  }

  // 單一音調
  function tone(freq, type, dur, vol = 0.3, delay = 0) {
    const c = ac();
    const osc = c.createOscillator();
    const gain = c.createGain();
    osc.connect(gain);
    gain.connect(c.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, c.currentTime + delay);
    gain.gain.setValueAtTime(vol, c.currentTime + delay);
    gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + dur);
    osc.start(c.currentTime + delay);
    osc.stop(c.currentTime + delay + dur + 0.01);
  }

  // 白噪音（擊打感）
  function noise(dur, vol = 0.2) {
    const c = ac();
    const buf = c.createBuffer(1, Math.floor(c.sampleRate * dur), c.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = c.createBufferSource();
    src.buffer = buf;
    const gain = c.createGain();
    src.connect(gain);
    gain.connect(c.destination);
    gain.gain.setValueAtTime(vol, c.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
    src.start();
    src.stop(c.currentTime + dur + 0.01);
  }

  const sounds = {
    slash:     () => noise(0.07, 0.25),                                         // 刀刃砍怪
    hit:       () => { tone(110, 'sawtooth', 0.25, 0.5); tone(75, 'square', 0.2, 0.3, 0.05); }, // 玩家受傷
    gem:       () => tone(1200, 'sine', 0.09, 0.12),                            // 撿寶石
    levelup:   () => [523, 659, 784, 1047].forEach((f,i) => tone(f, 'sine', 0.18, 0.28, i*0.09)), // 升級
    gameover:  () => [350, 260, 180, 130].forEach((f,i) => tone(f, 'sawtooth', 0.45, 0.35, i*0.18)), // 死亡
    evolution: () => {                                                            // 武器進化
      [523, 659, 784, 1047].forEach((f,i) => tone(f, 'sine', 0.5, 0.32, i*0.1));
      tone(1568, 'sine', 0.9, 0.38, 0.45);
    },

const joyAim  = { active: false, x: 0, y: 0, touchId: null };
const isTouchDevice = (window.matchMedia && window.matchMedia('(hover: none) and (pointer: coarse)').matches)
  || ('ontouchstart' in window);

function setupJoystick(elId, stateObj) {
  const el = document.getElementById(elId);
  const knob = el.querySelector('.joystick-knob');
  const radius = 42; // 搖桿桿子最大位移半徑

  function getCenter() {
    const r = el.getBoundingClientRect();
    return { cx: r.left + r.width / 2, cy: r.top + r.height / 2 };
  }
  function updateKnob(dx, dy) {
    knob.style.transform = `translate(${dx}px, ${dy}px)`;
  }
  function resetKnob() {
    knob.style.transform = 'translate(0px, 0px)';
  }
  function pickTouch(e) {
    for (const t of e.changedTouches) {
      const r = el.getBoundingClientRect();
      if (t.clientX >= r.left && t.clientX <= r.right
       && t.clientY >= r.top  && t.clientY <= r.bottom) return t;
    }
    return null;
  }
  function findTouchById(touches, id) {
    for (const t of touches) if (t.identifier === id) return t;
    return null;
  }

  el.addEventListener('touchstart', e => {
    const t = pickTouch(e);
    if (!t) return;
    e.preventDefault();
    stateObj.active = true;
    stateObj.touchId = t.identifier;
    const { cx, cy } = getCenter();
    let dx = t.clientX - cx, dy = t.clientY - cy;
    const len = Math.hypot(dx, dy);
    if (len > radius) { dx = dx / len * radius; dy = dy / len * radius; }
    stateObj.x = dx / radius;
    stateObj.y = dy / radius;
    updateKnob(dx, dy);
  }, { passive: false });

  el.addEventListener('touchmove', e => {
    if (!stateObj.active) return;
    const t = findTouchById(e.touches, stateObj.touchId);
    if (!t) return;
    e.preventDefault();
    const { cx, cy } = getCenter();
    let dx = t.clientX - cx, dy = t.clientY - cy;
    const len = Math.hypot(dx, dy);
    if (len > radius) { dx = dx / len * radius; dy = dy / len * radius; }
    stateObj.x = dx / radius;
    stateObj.y = dy / radius;
    updateKnob(dx, dy);
  }, { passive: false });

  function endTouch(e) {
    const t = findTouchById(e.changedTouches, stateObj.touchId);
    if (!t && stateObj.touchId !== null) return;
    stateObj.active = false;
    stateObj.touchId = null;
    stateObj.x = 0;
    stateObj.y = 0;
    resetKnob();
  }
  el.addEventListener('touchend', endTouch);
  el.addEventListener('touchcancel', endTouch);
}

function pickUpgradeOptions() {
  const levels = player.skillLevels;
  // 優先未滿級的技能
  let available = SKILL_POOL.filter(s => (levels[s.id] || 0) < s.maxLevel);

  // cycle reset：全部滿級則允許重選
  if (available.length === 0) {
    available = [...SKILL_POOL];
  }

  // Fisher-Yates shuffle，取前 3
  const shuffled = [...available];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  const picks = shuffled.slice(0, Math.min(3, shuffled.length));

  // 雙倍升級：每次至多 1 張卡標記為 bonusLevel: 2，降低初始難度
  // 機率隨 player level 遞減：Lv ≤ 3 20% / ≤ 7 10% / 之後 5%
  const doubleChance = level <= 3 ? 0.20 : level <= 7 ? 0.10 : 0.05;
  if (picks.length > 0 && Math.random() < doubleChance) {
    const idx = Math.floor(Math.random() * picks.length);
    picks[idx] = { ...picks[idx], bonusLevel: 2 };
  }
  return picks;
}

function applySkill(id, times = 1) {
  const skill = SKILL_POOL.find(s => s.id === id);
  if (!skill) return;
  for (let i = 0; i < times; i++) {
    skill.apply(player);
    if (!player.skillLevels[id]) player.skillLevels[id] = 0;
    player.skillLevels[id]++;
  }
  checkEvolutions(); // V3：檢查武器進化條件
}

    const rarity = skill.rarity || 'common';
    const isDouble = skill.bonusLevel === 2;
    const card = document.createElement('div');
    card.className = `skill-card ${rarity}` + (isDouble ? ' double' : '') + (isCycleReset ? ' maxed' : '');
    const rarityLabel = { common: 'COMMON', rare: 'RARE', legendary: 'LEGENDARY' }[rarity];
    const lvLabel = isDouble
      ? (isCycleReset ? '✨ 強化加成 ×2' : `Lv ${nextLv} → ${nextLv + 1}`)
      : (isCycleReset ? '✨ 強化加成' : `Lv ${nextLv}`);
    const doubleBadge = isDouble ? '<div class="card-double-badge">×2</div>' : '';
    card.innerHTML = `

function getEnemyTypeByTime() {
  const s = getGameSeconds();
  const r = Math.random();
  if (s < 60) {
    return r < 0.70 ? 'skeleton' : 'zombie';
  } else if (s < 120) {
    // 60s~2min：骷髏/殭屍/精英
    if (r < 0.60) return 'skeleton';
    if (r < 0.82) return 'zombie';
    return 'elite_skeleton';
  } else if (s < 300) {
    // 2min~5min：弓箭手開始出現
    if (r < 0.45) return 'skeleton';
    if (r < 0.65) return 'zombie';
    if (r < 0.82) return 'elite_skeleton';
    return 'skeleton_archer';
  } else {
    // 5min+：弓箭手大量
    if (r < 0.30) return 'skeleton';
    if (r < 0.50) return 'zombie';
    if (r < 0.70) return 'elite_skeleton';
    return 'skeleton_archer';
  }
}

let ghostOrbs = [];

function fireGhostOrb() {
  // 找最近的存活敵人
  let target = null;
  let minDist = Infinity;
  for (const e of enemies) {
    if (e.dead) continue;
    const dx = e.x - player.x, dy = e.y - player.y;
    const d = dx * dx + dy * dy;
    if (d < minDist) { minDist = d; target = e; }
  }

  const angle = target
    ? Math.atan2(target.y - player.y, target.x - player.x)
    : Math.random() * Math.PI * 2;

  ghostOrbs.push({
    x: player.x, y: player.y,
    vx: Math.cos(angle) * 4.5,
    vy: Math.sin(angle) * 4.5,
    life: 120,
    maxLife: 120,
    targetId: target ? target.id : null
  });
}

function updateGhostOrbs() {
  for (const orb of ghostOrbs) {
    // 追蹤目標
    if (orb.targetId !== null) {
      const t = enemies.find(e => e.id === orb.targetId && !e.dead);
      if (t) {
        const dx = t.x - orb.x, dy = t.y - orb.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 1) {
          orb.vx += (dx / dist) * 0.6;
          orb.vy += (dy / dist) * 0.6;
          // 限速
          const spd = Math.sqrt(orb.vx * orb.vx + orb.vy * orb.vy);
          if (spd > 5.5) { orb.vx = (orb.vx / spd) * 5.5; orb.vy = (orb.vy / spd) * 5.5; }
        }
      }
    }
    orb.x += orb.vx;
    orb.y += orb.vy;
    orb.life--;

    // 命中敵人（V3：使用 takeDamage，支援多 HP 怪物）
    for (const e of enemies) {
      if (!e.dead && circleCollide(orb.x, orb.y, 6, e.x, e.y, e.radius)) {
        if (e.takeDamage()) killEnemy(e, false); // false = 連鎖殺，不觸發 bomb/chain
        orb.life = 0;
        break;
      }
    }
  }
  ghostOrbs = ghostOrbs.filter(o => o.life > 0);
}

  bladeRadius: 55,
  bladeArc: Math.PI * 0.55,   // ← V2 抽出為可修改屬性
  bladeAngle: 0,
  speed: 3.2,
  hp: 5,
  maxHp: 5,
  invincible: 0,
  bladeSpinAngle: 0,

  // V2 新增
  skillLevels: {},
  magnetRange: 80,
  ghostOrbLevel: 0,
  ghostOrbTimer: 0,
  areaBombRadius: 0,
  chainSlashLevel: 0,

  // V3 新增
  evolutions: {},
  soulScytheActive: false,
  hellfireActive: false,
  stormChainActive: false,

  update() {
    let dx = 0, dy = 0;
    if (keys['w'] || keys['W'] || keys['ArrowUp'])    dy -= 1;
    if (keys['s'] || keys['S'] || keys['ArrowDown'])   dy += 1;
    if (keys['a'] || keys['A'] || keys['ArrowLeft'])   dx -= 1;
    if (keys['d'] || keys['D'] || keys['ArrowRight'])  dx += 1;

    // 搖桿輸入：鍵盤無輸入時生效（dead-zone 0.15）
    if (dx === 0 && dy === 0 && joyMove.active) {
      const mag = Math.hypot(joyMove.x, joyMove.y);
      if (mag > 0.15) {
        this.x += joyMove.x * this.speed;
        this.y += joyMove.y * this.speed;
      }
    } else if (dx !== 0 || dy !== 0) {
      const len = Math.sqrt(dx * dx + dy * dy);
      this.x += (dx / len) * this.speed;
      this.y += (dy / len) * this.speed;
    }

    this.x = Math.max(this.radius + 2, Math.min(canvas.width  - this.radius - 2, this.x));
    this.y = Math.max(this.radius + 2, Math.min(canvas.height - this.radius - 2, this.y));

    // 瞄準：右搖桿啟用時用搖桿方向，否則用滑鼠座標
    if (joyAim.active && Math.hypot(joyAim.x, joyAim.y) > 0.15) {
      this.bladeAngle = Math.atan2(joyAim.y, joyAim.x);
    } else {
      this.bladeAngle = Math.atan2(mouseY - this.y, mouseX - this.x);
    }
    this.bladeSpinAngle += 0.18;

    if (this.invincible > 0) this.invincible--;

    // 鬼火計時（只在 playing 狀態）
    if (this.ghostOrbLevel > 0) {
      this.ghostOrbTimer++;
      const interval = this.ghostOrbLevel >= 3 ? 60 : 120; // Lv3=1s, 其他=2s
      if (this.ghostOrbTimer >= interval) {
        this.ghostOrbTimer = 0;
        const orbCount = [1, 3, 5][Math.min(this.ghostOrbLevel - 1, 2)];
        for (let i = 0; i < orbCount; i++) fireGhostOrb();
      }
    }
  },

  isInBladeZone(ex, ey, er) {
    const dx = ex - this.x;
    const dy = ey - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > this.bladeRadius + er) return false;
    const angle = Math.atan2(dy, dx);
    let diff = angle - this.bladeAngle;
    while (diff >  Math.PI) diff -= 2 * Math.PI;
    while (diff < -Math.PI) diff += 2 * Math.PI;
    return Math.abs(diff) <= this.bladeArc;  // ← 使用 bladeArc 屬性
  },

  takeDamage() {
    if (this.invincible > 0) return false;
    this.hp--;
    this.invincible = 70;
    addParticles(this.x, this.y, '#C44B1A', 6);
    SFX.play('hit');
    return true;
  },

  draw() {
    // 刀刃扇形光效
    ctx.save();

    // 刀刃加滿或進化時顯示金色
    const isMaxBlade = this.bladeArc >= Math.PI * 0.90 || this.soulScytheActive;
    const bladeColor1 = isMaxBlade ? 'rgba(255, 220, 80, 0.40)' : 'rgba(120, 220, 255, 0.35)';
    const bladeColor2 = isMaxBlade ? 'rgba(200, 160, 40, 0.22)' : 'rgba(80,  180, 255, 0.2)';
    const strokeColor = isMaxBlade ? 'rgba(255, 200, 80, 0.9)' : 'rgba(150, 230, 255, 0.8)';

    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.bladeRadius);
    grad.addColorStop(0,   bladeColor1);
    grad.addColorStop(0.6, bladeColor2);
    grad.addColorStop(1,   'rgba(50, 130, 255, 0.0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.arc(this.x, this.y, this.bladeRadius,
      this.bladeAngle - this.bladeArc,
      this.bladeAngle + this.bladeArc);
    ctx.closePath();
    ctx.fill();

    // 刀刃外弧線
    ctx.strokeStyle = strokeColor;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.bladeRadius,
      this.bladeAngle - this.bladeArc,
      this.bladeAngle + this.bladeArc);
    ctx.stroke();

    // 旋轉刀刃線條
    ctx.strokeStyle = isMaxBlade ? 'rgba(255, 230, 120, 0.95)' : 'rgba(200, 240, 255, 0.9)';
    ctx.lineWidth = 2.5;
    for (let i = 0; i < 3; i++) {
      const a = this.bladeSpinAngle + (i / 3) * Math.PI * 2;
      const endX = this.x + Math.cos(a) * this.bladeRadius * 0.8;
      const endY = this.y + Math.sin(a) * this.bladeRadius * 0.8;
      let da = a - this.bladeAngle;
      while (da >  Math.PI) da -= Math.PI * 2;
      while (da < -Math.PI) da += Math.PI * 2;
      if (Math.abs(da) <= this.bladeArc) {
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(endX, endY);
        ctx.stroke();
      }
    }
    ctx.restore();

    // 玩家本體 ── 板甲勇者（2.5D）
    ctx.save();
    if (this.invincible > 0 && Math.floor(this.invincible / 5) % 2 === 1) ctx.globalAlpha = 0.4;

    const fx = Math.cos(this.bladeAngle);
    const fy = Math.sin(this.bladeAngle);
    const rx = -fy, ry = fx; // 右側方向（垂直於面向）

    // 地面陰影（2.5D 強化）
    ctx.fillStyle = 'rgba(26, 22, 18, 0.5)';
    ctx.beginPath();
    ctx.ellipse(this.x + 5, this.y + this.radius + 2, this.radius * 0.92, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // 腿部（2.5D 等距視角，帶走路動畫）
    const walkCycle = Math.sin(frameCount * 0.18) * 5;
    const legBaseY = this.y + this.radius * 0.55;
    // 左腳靴子
    ctx.fillStyle = '#2A231C';   // surface（深靴）
    ctx.strokeStyle = '#1A1612'; // ink
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(
      this.x - rx * 6 + fx * walkCycle * 0.5,
      legBaseY + walkCycle,
      5, 3.5, this.bladeAngle, 0, Math.PI * 2
    );
    ctx.fill(); ctx.stroke();
    // 右腳靴子
    ctx.beginPath();
    ctx.ellipse(
      this.x + rx * 6 - fx * walkCycle * 0.5,
      legBaseY - walkCycle,
      5, 3.5, this.bladeAngle, 0, Math.PI * 2
    );
    ctx.fill(); ctx.stroke();

    // 斗篷（面向方向後方，隨移動飄動）
    ctx.fillStyle = '#8B1A1A';
    ctx.strokeStyle = '#5A0808';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(this.x + rx * 12,  this.y + ry * 12);
    ctx.bezierCurveTo(
      this.x - fx * 6 + rx * 16, this.y - fy * 6 + ry * 16,
      this.x - fx * 20 + rx * 7, this.y - fy * 20 + ry * 7,
      this.x - fx * 23,           this.y - fy * 23
    );
    ctx.bezierCurveTo(
      this.x - fx * 20 - rx * 7, this.y - fy * 20 - ry * 7,
      this.x - fx * 6 - rx * 16, this.y - fy * 6 - ry * 16,
      this.x - rx * 12,           this.y - ry * 12
    );
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // 斗篷邊緣金色飾邊
    ctx.strokeStyle = 'rgba(200,160,30,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(this.x + rx * 11, this.y + ry * 11);
    ctx.bezierCurveTo(
      this.x - fx * 5 + rx * 15, this.y - fy * 5 + ry * 15,
      this.x - fx * 19 + rx * 7, this.y - fy * 19 + ry * 7,
      this.x - fx * 22,           this.y - fy * 22
    );
    ctx.stroke();

    // 盾牌（面向左側）
    const shX = this.x - rx * 14 + fx * 3;
    const shY = this.y - ry * 14 + fy * 3;
    ctx.save();
    ctx.translate(shX, shY);
    ctx.rotate(this.bladeAngle + Math.PI * 0.5);
    const shGrad = ctx.createLinearGradient(-7, -11, 6, 9);
    shGrad.addColorStop(0, '#CC3030');
    shGrad.addColorStop(1, '#4A0808');
    ctx.fillStyle = shGrad;
    ctx.strokeStyle = '#C8941A';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, -11); ctx.lineTo(7.5, -5);
    ctx.lineTo(7.5, 5); ctx.lineTo(0, 11);
    ctx.lineTo(-7.5, 5); ctx.lineTo(-7.5, -5);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // 盾牌十字
    ctx.strokeStyle = 'rgba(255,215,0,0.8)';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(0, -6); ctx.lineTo(0, 6);
    ctx.moveTo(-4.5, 0); ctx.lineTo(4.5, 0);
    ctx.stroke();
    ctx.restore();

    // 主體板甲（冷鐵 flat --hero #6E7480 + 1px ink 邊，木刻偏移陰影）
    // 偏移陰影
    ctx.fillStyle = 'rgba(26, 22, 18, 0.55)';
    ctx.save();
    ctx.translate(this.x + 3, this.y + 3);
    ctx.rotate(this.bladeAngle);
    ctx.beginPath();
    ctx.ellipse(0, 0, this.radius * 0.88, this.radius, 0, 0, Math.PI * 2);
    ctx.restore();
    ctx.fill();
    // 主體冷鐵
    ctx.fillStyle = '#6E7480';   // --hero cold iron
    ctx.strokeStyle = '#1A1612'; // --ink (bg color as border)
    ctx.lineWidth = 1.5;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.bladeAngle);
    ctx.beginPath();
    ctx.ellipse(0, 0, this.radius * 0.88, this.radius, 0, 0, Math.PI * 2);
    ctx.restore();
    ctx.fill();
    ctx.stroke();
    // 右側暗部（模擬 woodblock 立體感）
    ctx.fillStyle = 'rgba(26, 22, 18, 0.25)';
    ctx.save();
    ctx.translate(this.x + this.radius * 0.2, this.y);
    ctx.rotate(this.bladeAngle);
    ctx.beginPath();
    ctx.ellipse(0, 0, this.radius * 0.6, this.radius, 0, 0, Math.PI * 2);
    ctx.restore();
    ctx.fill();
    // 左上高光線（冷鐵亮邊）
    ctx.strokeStyle = 'rgba(180,190,200,0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius - 2,
      this.bladeAngle - Math.PI * 0.6, this.bladeAngle - Math.PI * 0.15);
    ctx.stroke();
    // 胸甲聖物金飾紋（後半弧）
    ctx.strokeStyle = 'rgba(200,148,26,0.55)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius - 5,
      this.bladeAngle + Math.PI * 0.65, this.bladeAngle + Math.PI * 1.35);
    ctx.stroke();

    // 頭盔（冷鐵 flat + 1px ink 邊）
    const hx = this.x + fx * 6, hy = this.y + fy * 6;
    // 偏移陰影
    ctx.fillStyle = 'rgba(26, 22, 18, 0.5)';
    ctx.beginPath();
    ctx.arc(hx + 2, hy + 2, 9.5, 0, Math.PI * 2);
    ctx.fill();
    // 冷鐵主體（比甲身稍亮，模擬不同光澤）
    ctx.fillStyle = '#7A8490';
    ctx.strokeStyle = '#1A1612';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(hx, hy, 9.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // 左側高光
    ctx.strokeStyle = 'rgba(180,190,200,0.55)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(hx, hy, 8.5, this.bladeAngle - Math.PI * 0.7, this.bladeAngle - Math.PI * 0.1);
    ctx.stroke();
    // 頭盔聖物金側飾
    ctx.strokeStyle = '#C8941A';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(hx, hy, 9.5, this.bladeAngle + Math.PI * 0.55, this.bladeAngle + Math.PI * 1.45);
    ctx.stroke();
    // 護面縫（鬼火青眼縫，無 shadowBlur）
    ctx.fillStyle = '#1A1612';
    ctx.beginPath();
    ctx.ellipse(hx + fx * 3, hy + fy * 3, 5.5, 2.2, this.bladeAngle, 0, Math.PI * 2);
    ctx.fill();
    // 鬼火青高光（--crit #5FA89C）
    ctx.fillStyle = '#5FA89C';
    ctx.beginPath();
    ctx.ellipse(hx + fx * 3, hy + fy * 3, 3.5, 1.2, this.bladeAngle, 0, Math.PI * 2);
    ctx.fill();
    // 高光點
    ctx.fillStyle = '#A8D8D0';
    ctx.beginPath();
    ctx.ellipse(hx + fx * 2.5, hy + fy * 2.5, 1.5, 0.7, this.bladeAngle, 0, Math.PI * 2);
    ctx.fill();
    // 頭頂血紅羽（配斗篷血色）
    ctx.strokeStyle = '#7B1A1A';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(hx - rx * 1.5, hy - ry * 1.5);
    ctx.quadraticCurveTo(
      hx - fx * 3 + rx * 4, hy - fy * 3 + ry * 4,
      hx - fx * 7 + rx * 5, hy - fy * 7 + ry * 5
    );
    ctx.stroke();
    ctx.lineCap = 'butt';

    ctx.restore();

    // 速度滿級：氣流殘影（speed 超過 3.2 * 1.08^3 ≈ 4.03）
    if (this.speed > 4.0) {
      ctx.save();
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = '#88FFCC';
      ctx.beginPath();
      ctx.arc(this.x - Math.cos(this.bladeAngle) * 14,
              this.y - Math.sin(this.bladeAngle) * 14, this.radius * 0.7, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // 玩家血條（頭上）
    const barW = 36, barH = 5;
    const bx = this.x - barW / 2;
    const by = this.y - this.radius - 14;
    ctx.fillStyle = 'rgba(26, 22, 18, 0.7)';
    ctx.fillRect(bx - 1, by - 1, barW + 2, barH + 2);
    const hpRatio = this.hp / this.maxHp;
    ctx.fillStyle = hpRatio > 0.5 ? '#C8941A' : hpRatio > 0.25 ? '#C44B1A' : '#7B1A1A';
    ctx.fillRect(bx, by, barW * hpRatio, barH);
  }
};

// ─────────────────────────────────────────
// 敵人
// ─────────────────────────────────────────
let enemies = [];
let enemyId = 0;

class Enemy {
  constructor(type) {
    this.id = enemyId++;
    this.type = type;
    this.dead = false;
    this.deathTimer = 0;
    this.wobble = Math.random() * Math.PI * 2;

    const margin = 30;
    const side = Math.floor(Math.random() * 4);
    if (side === 0) { this.x = Math.random() * canvas.width;  this.y = -margin; }
    else if (side === 1) { this.x = canvas.width + margin;   this.y = Math.random() * canvas.height; }
    else if (side === 2) { this.x = Math.random() * canvas.width;  this.y = canvas.height + margin; }
    else              { this.x = -margin;                    this.y = Math.random() * canvas.height; }

    // V3：HP 系統
    const HP_TABLE = { skeleton: 1, zombie: 1, elite_skeleton: 3, skeleton_archer: 2, boss: 250 };
    this.maxHp = HP_TABLE[type] || 1;
    this.hp = this.maxHp;
    this.hitCooldown = 0;   // 受傷後無敵幀（防止每幀多次扣血）
    this.flashTimer = 0;    // 受傷白色閃爍

    if (type === 'skeleton') {
      this.radius = 14;
      this.speed  = 1.4 + Math.random() * 0.8;
      this.color  = '#E8DCC4';
      this.expValue = 1;
    } else if (type === 'zombie') {
      this.radius = 19;
      this.speed  = 0.7 + Math.random() * 0.5;
      this.color  = '#7DBD7D';
      this.expValue = 3;   // 殭屍：比骷髏難打，XP 多
    } else if (type === 'elite_skeleton') {
      // V3：精英骷髏
      this.radius = 22;
      this.speed  = 1.8 + Math.random() * 0.8;
      this.color  = '#F5E642';
      this.expValue = 6;   // 精英：高速高 XP
    } else if (type === 'boss') {
      // 大魔王
      this.radius = 45;
      this.speed  = 1.3;
      this.color  = '#7B1A1A';  // --blood（大魔王）
      this.expValue = 50;
      this.shootTimer = 0;   // 8 方向箭矢
      this.dashTimer = 0;    // 衝刺攻擊
      this.isDashing = false;
      this.dashVx = 0;
      this.dashVy = 0;
    } else {
      // V3：骷髏弓箭手
      this.radius = 14;
      this.speed  = 1.2 + Math.random() * 0.6;
      this.color  = '#C8E8C8';
      this.expValue = 4;   // 弓箭手：遠程更危險，XP 稍高
      this.shootTimer = 0;
    }

    this.wanderOffset = (Math.random() - 0.5) * 0.4;
  }

  update() {
    if (this.dead) { this.deathTimer++; return; }
    this.wobble += 0.12;
    if (this.hitCooldown > 0) this.hitCooldown--;
    if (this.flashTimer > 0) this.flashTimer--;

    const dx = player.x - this.x;
    const dy = player.y - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (this.type === 'boss') {
      // 大魔王 AI
      this.dashTimer++;

      if (this.isDashing) {
        // 衝刺中：高速前進
        this.x += this.dashVx;
        this.y += this.dashVy;
        if (this.dashTimer >= 30) {
          this.isDashing = false;
          this.speed = 1.3;
        }
      } else if (this.dashTimer >= 240) {
        // 每 4 秒衝刺一次
        this.dashTimer = 0;
        this.isDashing = true;
        const dlen = dist || 1;
        this.dashVx = (dx / dlen) * 7;
        this.dashVy = (dy / dlen) * 7;
      } else if (dist > 1) {
        // 緩慢逼近
        this.x += (dx / dist) * this.speed;
        this.y += (dy / dist) * this.speed;
      }

      // 每 120 frames 發射 8 方向箭矢
      this.shootTimer++;
      if (this.shootTimer >= 120) {
        this.shootTimer = 0;
        for (let i = 0; i < 8; i++) {
          const angle = (i / 8) * Math.PI * 2;
          arrows.push({ x: this.x, y: this.y,
            vx: Math.cos(angle) * 4, vy: Math.sin(angle) * 4,
            life: 200, angle });
        }
      }
    } else if (this.type === 'skeleton_archer') {
      // V3：弓箭手保持距離 AI
      if (dist > 1) {
        const wob = Math.sin(this.wobble) * 0.3;
        if (dist < 150) {
          // 逃跑
          this.x -= (dx / dist) * this.speed;
          this.y -= (dy / dist) * this.speed;
        } else if (dist > 300) {
          // 靠近
          this.x += (dx / dist + wob) * this.speed;
          this.y += (dy / dist) * this.speed;
        } else {
          // 橫向保持距離
          this.x += (-dy / dist + wob) * this.speed * 0.7;
          this.y += (dx / dist) * this.speed * 0.7;
        }
      }
      this.shootTimer++;
      if (this.shootTimer >= 180) {
        this.shootTimer = 0;
        fireArrow(this.x, this.y);
      }
    } else {
      if (dist > 1) {
        const perpX = -dy / dist;
        const perpY =  dx / dist;
        this.x += (dx / dist) * this.speed + perpX * Math.sin(this.wobble + this.id) * 0.3;
        this.y += (dy / dist) * this.speed + perpY * Math.sin(this.wobble + this.id) * 0.3;
      }
    }
  }

  draw() {
    if (this.dead) { this.drawDeath(); return; }
    ctx.save();
    // V3：受傷閃爍效果
    if (this.flashTimer > 0 && this.flashTimer % 2 === 0) ctx.globalAlpha = 0.35;
    if (this.type === 'skeleton') this.drawSkeleton();
    else if (this.type === 'zombie') this.drawZombie();
    else if (this.type === 'elite_skeleton') this.drawEliteSkeleton();
    else if (this.type === 'boss') this.drawBoss();
    else this.drawArcher();
    ctx.restore();
  }

  drawSkeleton() {
    // 天堂風骷髏戰士（2.5D）
    const x = this.x, y = this.y, r = this.radius;
    const bob = Math.sin(this.wobble) * 2;
    const swing = Math.sin(this.wobble) * 5;

    // 地面陰影
    ctx.fillStyle = 'rgba(26, 22, 18, 0.32)';
    ctx.beginPath();
    ctx.ellipse(x + 2, y + r + 1, r * 0.68, 3.5, 0, 0, Math.PI * 2);
    ctx.fill();

    // 手臂骨骼（底層先畫）
    ctx.strokeStyle = '#C8C0A4';
    ctx.lineCap = 'round';
    ctx.lineWidth = 2.5;
    ctx.beginPath(); // 左上臂
    ctx.moveTo(x - r * 0.62, y + bob + 1);
    ctx.lineTo(x - r - 4, y + bob + 5 + swing);
    ctx.stroke();
    ctx.lineWidth = 2;
    ctx.beginPath(); // 左前臂
    ctx.moveTo(x - r - 4, y + bob + 5 + swing);
    ctx.lineTo(x - r - 7, y + bob + 13 + swing * 0.6);
    ctx.stroke();
    ctx.lineWidth = 2.5;
    ctx.beginPath(); // 右上臂（持劍）
    ctx.moveTo(x + r * 0.62, y + bob + 1);
    ctx.lineTo(x + r + 4, y + bob + 4 - swing * 0.7);
    ctx.stroke();
    ctx.lineWidth = 2;
    ctx.beginPath(); // 右前臂
    ctx.moveTo(x + r + 4, y + bob + 4 - swing * 0.7);
    ctx.lineTo(x + r + 2, y + bob + 12 - swing * 0.4);
    ctx.stroke();
    ctx.lineCap = 'butt';

    // 骨骼軀幹（2.5D 漸層橢圓）
    const tGrad = ctx.createLinearGradient(x - r, y + bob - r * 0.5, x + r * 0.5, y + bob + r * 0.5);
    tGrad.addColorStop(0,   '#EEEADE');
    tGrad.addColorStop(0.5, '#C8C0A4');
    tGrad.addColorStop(1,   '#707060');
    ctx.fillStyle = tGrad;
    ctx.strokeStyle = '#454035';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(x, y + bob, r, r * 0.88, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // 肋骨（左右各 3 條弧線，由脊椎向外延伸）
    ctx.strokeStyle = 'rgba(65, 58, 45, 0.72)';
    ctx.lineWidth = 1.1;
    for (let i = 0; i < 3; i++) {
      const ry = y + bob - 2 + i * 4.8;
      ctx.beginPath();
      ctx.moveTo(x - 2, ry);
      ctx.quadraticCurveTo(x - r * 0.44, ry - 1.5, x - r * 0.58, ry + 3.5);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x + 2, ry);
      ctx.quadraticCurveTo(x + r * 0.44, ry - 1.5, x + r * 0.58, ry + 3.5);
      ctx.stroke();
    }

    // 骷髏頭（天堂風，偏大）
    const sy = y + bob - r * 0.46;
    const sr = r * 0.70;
    const skGrad = ctx.createLinearGradient(x - sr, sy - sr, x + sr * 0.5, sy + sr * 0.5);
    skGrad.addColorStop(0,   '#F5F2E4');
    skGrad.addColorStop(0.55, '#D0C8B0');
    skGrad.addColorStop(1,   '#6A6250');
    ctx.fillStyle = skGrad;
    ctx.strokeStyle = '#353020';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(x, sy, sr, sr * 1.06, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // 眼眶（黑底 + 鬼火青，符合設計系統 --crit #5FA89C）
    for (const ex of [-r * 0.29, r * 0.29]) {
      ctx.fillStyle = '#100C06';
      ctx.beginPath();
      ctx.ellipse(x + ex, sy - 0.5, r * 0.21, r * 0.27, 0, 0, Math.PI * 2);
      ctx.fill();
      // 無 shadowBlur：用偏移填色模擬深度
      ctx.fillStyle = '#2A5048';   // 深底
      ctx.beginPath();
      ctx.ellipse(x + ex + 0.5, sy + 0.5, r * 0.13, r * 0.17, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#5FA89C';   // 鬼火青主色
      ctx.beginPath();
      ctx.ellipse(x + ex, sy - 0.5, r * 0.12, r * 0.16, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#A8D8D0';   // 高光點
      ctx.beginPath();
      ctx.ellipse(x + ex - 0.8, sy - 1.5, r * 0.055, r * 0.07, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // 鼻孔（倒 V）
    ctx.fillStyle = '#100C06';
    ctx.beginPath();
    ctx.moveTo(x - 2,   sy + r * 0.17);
    ctx.lineTo(x,       sy + r * 0.25);
    ctx.lineTo(x + 2,   sy + r * 0.17);
    ctx.moveTo(x - 0.8, sy + r * 0.17);
    ctx.lineTo(x + 0.8, sy + r * 0.17);
    ctx.fill();

    // 下顎牙齒
    ctx.fillStyle = '#E8DCC4';   // ink
    ctx.strokeStyle = '#7A6A52'; // muted
    ctx.lineWidth = 0.8;
    for (let i = -2; i <= 1; i++) {
      ctx.beginPath();
      ctx.rect(x + i * 3.4 + 0.5, sy + r * 0.30, 2.7, 4.5);
      ctx.fill(); ctx.stroke();
    }

    // 右手鐵劍
    const swX = x + r + 3;
    const swY = y + bob + 11 - swing * 0.4;
    ctx.save();
    ctx.translate(swX, swY);
    ctx.rotate(0.25);
    ctx.strokeStyle = '#909898'; ctx.lineWidth = 2; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(0, -15); ctx.lineTo(1.5, 2); ctx.stroke();
    ctx.strokeStyle = '#606868'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(-1, -15); ctx.lineTo(0, -4); ctx.stroke(); // 刃面反光
    ctx.strokeStyle = '#7B4E20'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(-5.5, 1); ctx.lineTo(5.5, 1); ctx.stroke(); // 護手
    ctx.strokeStyle = '#9B6E30'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(0.5, 2); ctx.lineTo(0.5, 7); ctx.stroke(); // 劍柄
    ctx.lineCap = 'butt';
    ctx.restore();
  }

  drawZombie() {
    // 天堂食屍鬼 Ghoul（2.5D，駝背獵食者）
    const x = this.x, y = this.y, r = this.radius;
    const bob = Math.sin(this.wobble * 0.7) * 2;
    const lunge = Math.sin(this.wobble * 1.1) * 3; // 撲食律動

    // 地面陰影
    ctx.fillStyle = 'rgba(26, 22, 18, 0.35)';
    ctx.beginPath();
    ctx.ellipse(x + 3, y + r, r * 0.82, 4.5, 0, 0, Math.PI * 2);
    ctx.fill();

    // 腐爛肌膚底層光暈
    const aura = ctx.createRadialGradient(x, y + bob, 0, x, y + bob, r + 7);
    aura.addColorStop(0, 'rgba(60,90,50,0.0)');
    aura.addColorStop(1, 'rgba(30,60,20,0.18)');
    ctx.fillStyle = aura;
    ctx.beginPath();
    ctx.arc(x, y + bob, r + 7, 0, Math.PI * 2);
    ctx.fill();

    // 爪手（底層先畫）
    const clawSwing = Math.sin(this.wobble * 1.3) * 4;
    ctx.strokeStyle = '#4A6040';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    // 左爪臂
    ctx.beginPath();
    ctx.moveTo(x - r * 0.65, y + bob - 3);
    ctx.lineTo(x - r - 5, y + bob + 4 + clawSwing);
    ctx.stroke();
    // 右爪臂
    ctx.beginPath();
    ctx.moveTo(x + r * 0.65, y + bob - 3);
    ctx.lineTo(x + r + 5, y + bob + 4 - clawSwing * 0.8);
    ctx.stroke();
    ctx.lineCap = 'butt';
    // 左爪指（3 根）
    ctx.strokeStyle = '#3A5030';
    ctx.lineWidth = 1.5;
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.moveTo(x - r - 5 + i * 2.5, y + bob + 4 + clawSwing);
      ctx.lineTo(x - r - 5 + i * 3.5 - 2, y + bob + 4 + clawSwing + 7);
      ctx.stroke();
    }
    // 右爪指（3 根）
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.moveTo(x + r + 5 + i * 2.5, y + bob + 4 - clawSwing * 0.8);
      ctx.lineTo(x + r + 5 + i * 3.5 + 2, y + bob + 4 - clawSwing * 0.8 + 7);
      ctx.stroke();
    }

    // 軀幹（食屍鬼軀體，不規則橢圓，2.5D 漸層）
    const bGrad = ctx.createLinearGradient(x - r, y + bob - r * 0.7, x + r * 0.7, y + bob + r * 0.7);
    bGrad.addColorStop(0,   '#90A878');
    bGrad.addColorStop(0.45, '#627850');
    bGrad.addColorStop(1,   '#2E4028');
    ctx.fillStyle = bGrad;
    ctx.strokeStyle = '#1A2A14';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(x, y + bob, r, r * 0.92, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // 肌肉腐爛暗紋
    ctx.strokeStyle = 'rgba(25, 40, 18, 0.55)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x - 5, y + bob - r * 0.4);
    ctx.quadraticCurveTo(x - 8, y + bob, x - 4, y + bob + r * 0.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 3, y + bob - r * 0.3);
    ctx.quadraticCurveTo(x + 9, y + bob + 2, x + 5, y + bob + r * 0.45);
    ctx.stroke();

    // 食屍鬼頭顱（寬扁、低眉弓，略向前傾）
    const hx = x + lunge * 0.4, hy = y + bob - r * 0.52 + lunge * 0.2;
    const hw = r * 0.80, hh = r * 0.68;
    const hGrad = ctx.createLinearGradient(hx - hw, hy - hh * 0.8, hx + hw * 0.6, hy + hh * 0.6);
    hGrad.addColorStop(0,   '#A8C090');
    hGrad.addColorStop(0.5, '#6A8858');
    hGrad.addColorStop(1,   '#283820');
    ctx.fillStyle = hGrad;
    ctx.strokeStyle = '#1A2810';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(hx, hy, hw, hh, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // 眉弓（低沉突出骨骼）
    ctx.fillStyle = '#4A6038';
    ctx.beginPath();
    ctx.ellipse(hx, hy - hh * 0.5, hw * 0.75, hh * 0.18, 0, Math.PI, Math.PI * 2);
    ctx.fill();

    // 眼睛（血紅色，無 shadowBlur，木刻偏移法）
    for (const ex of [-r * 0.30, r * 0.30]) {
      ctx.fillStyle = '#0A0A08';
      ctx.beginPath();
      ctx.ellipse(hx + ex, hy - hh * 0.12, r * 0.20, r * 0.24, 0, 0, Math.PI * 2);
      ctx.fill();
      // 偏移深底（木刻陰影）
      ctx.fillStyle = '#3D0A0A';
      ctx.beginPath();
      ctx.ellipse(hx + ex + 0.5, hy - hh * 0.12 + 0.5, r * 0.13, r * 0.15, 0, 0, Math.PI * 2);
      ctx.fill();
      // 血紅主色（--blood #7B1A1A 加亮版）
      ctx.fillStyle = '#9B2A2A';
      ctx.beginPath();
      ctx.ellipse(hx + ex, hy - hh * 0.12, r * 0.12, r * 0.14, 0, 0, Math.PI * 2);
      ctx.fill();
      // 高光點
      ctx.fillStyle = '#C44B1A';
      ctx.beginPath();
      ctx.ellipse(hx + ex - 0.8, hy - hh * 0.18, r * 0.055, r * 0.065, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // 闊口裂縫（獠牙）
    ctx.strokeStyle = '#1A2810';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(hx, hy + hh * 0.25, r * 0.45, 0.2, Math.PI - 0.2);
    ctx.stroke();
    // 獠牙
    ctx.fillStyle = '#E8E0C8';
    ctx.strokeStyle = '#706050';
    ctx.lineWidth = 0.8;
    for (const [tx, len] of [[-r*0.3, 5], [-r*0.08, 6.5], [r*0.08, 6.5], [r*0.3, 5]]) {
      ctx.beginPath();
      ctx.moveTo(hx + tx - 1.5, hy + hh * 0.22);
      ctx.lineTo(hx + tx,       hy + hh * 0.22 + len);
      ctx.lineTo(hx + tx + 1.5, hy + hh * 0.22);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    }
  }

  drawDeath() {
    const progress = this.deathTimer / 25;
    ctx.save();
    ctx.globalAlpha = Math.max(0, 1 - progress);

    if (this.type === 'skeleton' || this.type === 'elite_skeleton' || this.type === 'skeleton_archer') {
      ctx.strokeStyle = this.type === 'elite_skeleton' ? '#F5E642' : '#EDEDDF';
      ctx.lineWidth = 2.5;
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 + this.deathTimer * 0.25;
        const r = progress * 35;
        const x1 = this.x + Math.cos(a) * r * 0.3;
        const y1 = this.y + Math.sin(a) * r * 0.3;
        const x2 = this.x + Math.cos(a) * r;
        const y2 = this.y + Math.sin(a) * r;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }
    } else {
      ctx.fillStyle = '#7A6A52';  // muted（蝕紙黃，殭屍腐爛碎片）
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2 + this.deathTimer * 0.15;
        const r = progress * 30;
        ctx.beginPath();
        ctx.arc(
          this.x + Math.cos(a) * r,
          this.y + Math.sin(a) * r,
          this.radius * (1 - progress) * 0.6, 0, Math.PI * 2
        );
        ctx.fill();
      }
    }
    ctx.restore();
  }

  // V3：受傷扣血
  takeDamage(amount = 1) {
    if (this.hitCooldown > 0) return false;
    this.hp -= amount;
    this.hitCooldown = 15;
    if (this.hp <= 0) return true;  // 死亡
    this.flashTimer = 8;            // 未死 → 閃爍
    return false;
  }

  // V3：多 HP 怪物的血條
  drawHpBar() {
    if (this.maxHp <= 1 || this.dead) return;
    const barW = 24, barH = 4;
    const bx = this.x - barW / 2, by = this.y - this.radius - 12;
    // 背景（surface）
    ctx.fillStyle = '#2A231C';
    ctx.fillRect(bx + 1, by + 1, barW, barH);  // 偏移陰影
    ctx.fillStyle = '#1A1612';
    ctx.fillRect(bx, by, barW, barH);
    // 血量（blood → warning 漸層，符合設計系統）
    const ratio = this.hp / this.maxHp;
    ctx.fillStyle = ratio > 0.5 ? '#7B1A1A' : '#C44B1A';
    ctx.fillRect(bx, by, barW * ratio, barH);
    // 邊框
    ctx.strokeStyle = '#7A6A52';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(bx, by, barW, barH);
  }

  // V3：精英骷髏
  drawEliteSkeleton() {
    const x = this.x, y = this.y, r = this.radius;
    const bobY = Math.sin(this.wobble) * 2;

    // 地面陰影
    ctx.fillStyle = 'rgba(26, 22, 18, 0.32)';
    ctx.beginPath();
    ctx.ellipse(x + 2, y + r + 1, r * 0.68, 3.5, 0, 0, Math.PI * 2);
    ctx.fill();

    // 暗紅披風（精英標識，取代金色光暈）
    ctx.fillStyle = '#4A1010';
    ctx.strokeStyle = '#7B1A1A';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(x, y + bobY + 4, r + 5, r * 0.55, 0, 0, Math.PI);
    ctx.fill();
    ctx.stroke();
    // 披風邊緣血紅細線
    ctx.strokeStyle = '#C44B1A';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(x, y + bobY, r + 6, Math.PI * 0.15, Math.PI * 0.85);
    ctx.stroke();

    // 精英骨粉主體（--enemy #D4C8A8 + 1px ink 邊）
    ctx.fillStyle = '#D4C8A8';
    ctx.strokeStyle = '#1A1612';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(x, y + bobY - 1, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // 骨面暗部（right-side shadow，模擬 woodblock 立體感）
    ctx.fillStyle = 'rgba(26, 22, 18, 0.18)';
    ctx.beginPath();
    ctx.ellipse(x + r * 0.25, y + bobY - 1, r * 0.7, r, 0, 0, Math.PI * 2);
    ctx.fill();

    // 眼眶（黑底 + 血紅，精英更危險）
    ctx.fillStyle = '#1A1612';
    ctx.beginPath();
    ctx.ellipse(x - 6, y + bobY - 3, 4.5, 5.5, 0, 0, Math.PI * 2);
    ctx.ellipse(x + 6, y + bobY - 3, 4.5, 5.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#7B1A1A';
    ctx.beginPath();
    ctx.ellipse(x - 6, y + bobY - 3.5, 2.8, 3.8, 0, 0, Math.PI * 2);
    ctx.ellipse(x + 6, y + bobY - 3.5, 2.8, 3.8, 0, 0, Math.PI * 2);
    ctx.fill();
    // 眼部高光
    ctx.fillStyle = '#C44B1A';
    ctx.beginPath();
    ctx.ellipse(x - 7, y + bobY - 4.5, 1.2, 1.5, 0, 0, Math.PI * 2);
    ctx.ellipse(x + 5, y + bobY - 4.5, 1.2, 1.5, 0, 0, Math.PI * 2);
    ctx.fill();

    // 鼻孔（inkhole）
    ctx.fillStyle = '#2A1C10';
    ctx.fillRect(x - 2, y + bobY + 1, 2, 3);
    ctx.fillRect(x + 1, y + bobY + 1, 2, 3);

    // 牙齒（骨粉亮，1px ink 邊）
    ctx.fillStyle = '#E8DCC4';
    ctx.strokeStyle = '#1A1612';
    ctx.lineWidth = 0.8;
    for (let i = -2; i <= 1; i++) {
      ctx.fillRect(x + i * 4.5 - 0.5, y + bobY + 7, 4, 7);
      ctx.strokeRect(x + i * 4.5 - 0.5, y + bobY + 7, 4, 7);
    }
    this.drawHpBar();
  }

  // V3：骷髏弓箭手
  drawArcher() {
    const x = this.x, y = this.y, r = this.radius;
    const bobY = Math.sin(this.wobble) * 2;

    // 地面陰影
    ctx.fillStyle = 'rgba(26, 22, 18, 0.28)';
    ctx.beginPath();
    ctx.ellipse(x + 2, y + r + 1, r * 0.65, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    // 骨粉主體（--enemy #D4C8A8 + 1px ink 邊）
    ctx.fillStyle = '#D4C8A8';
    ctx.strokeStyle = '#1A1612';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(x, y + bobY - 1, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // 右側暗部
    ctx.fillStyle = 'rgba(26, 22, 18, 0.15)';
    ctx.beginPath();
    ctx.ellipse(x + r * 0.3, y + bobY - 1, r * 0.6, r, 0, 0, Math.PI * 2);
    ctx.fill();

    // 眼眶（黑底 + 鬼火青，與普通骷髏一致）
    ctx.fillStyle = '#1A1612';
    ctx.beginPath();
    ctx.ellipse(x - 4, y + bobY - 3, 3, 4, 0, 0, Math.PI * 2);
    ctx.ellipse(x + 4, y + bobY - 3, 3, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#5FA89C';
    ctx.beginPath();
    ctx.ellipse(x - 4, y + bobY - 3.5, 1.8, 2.5, 0, 0, Math.PI * 2);
    ctx.ellipse(x + 4, y + bobY - 3.5, 1.8, 2.5, 0, 0, Math.PI * 2);
    ctx.fill();

    // 鼻孔
    ctx.fillStyle = '#2A1C10';
    ctx.fillRect(x - 1.5, y + bobY + 1, 1.5, 2.5);
    ctx.fillRect(x + 0.5, y + bobY + 1, 1.5, 2.5);

    // 弓（聖物金 --xp-glow #C8941A）
    ctx.strokeStyle = '#C8941A';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(x + r + 3, y + bobY, r * 0.7, -Math.PI * 0.6, Math.PI * 0.6);
    ctx.stroke();
    // 弓弦（ink 色）
    ctx.strokeStyle = '#7A6A52';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + r + 3 - r * 0.42, y + bobY - r * 0.6);
    ctx.lineTo(x + r + 3 - r * 0.42, y + bobY + r * 0.6);
    ctx.stroke();
    // 弓握把金色裝飾
    ctx.strokeStyle = '#A0741A';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + r + 3, y + bobY - 3);
    ctx.lineTo(x + r + 3, y + bobY + 3);
    ctx.stroke();

    this.drawHpBar();
  }

  drawBoss() {
    const bobY = Math.sin(this.wobble * 0.5) * 4;
    const x = this.x, y = this.y + bobY;
    const r = this.radius;

    // 血紅色大光暈
    const aura = ctx.createRadialGradient(x, y, 0, x, y, r + 20);
    aura.addColorStop(0, 'rgba(200,0,0,0.0)');
    aura.addColorStop(1, 'rgba(180,0,0,0.35)');
    ctx.fillStyle = aura;
    ctx.beginPath();
    ctx.arc(x, y, r + 20, 0, Math.PI * 2);
    ctx.fill();

    // 骷髏頭主體（blood 暗底 + 1px ink 邊，木刻偏移陰影）
    // 偏移陰影
    ctx.fillStyle = 'rgba(26, 22, 18, 0.7)';
    ctx.beginPath();
    ctx.arc(x + 3, y + 3, r, 0, Math.PI * 2);
    ctx.fill();
    // 主體
    ctx.fillStyle = '#3A0C0C';   // 深牛血底色
    ctx.strokeStyle = '#7B1A1A'; // --blood
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // 外圈暗紅框（雙框感）
    ctx.strokeStyle = '#C44B1A';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(x, y, r + 3, 0, Math.PI * 2);
    ctx.stroke();

    // 血紅眼睛（大魔王，無 shadowBlur，偏移木刻法）
    // 眼眶黑底 + 偏移陰影
    ctx.fillStyle = '#1A1612';
    ctx.beginPath();
    ctx.ellipse(x - 13 + 1, y - 8 + 1, 10, 12, 0, 0, Math.PI * 2);
    ctx.ellipse(x + 13 + 1, y - 8 + 1, 10, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#0A0604';
    ctx.beginPath();
    ctx.ellipse(x - 13, y - 8, 9, 11, 0, 0, Math.PI * 2);
    ctx.ellipse(x + 13, y - 8, 9, 11, 0, 0, Math.PI * 2);
    ctx.fill();
    // 血紅主色（--blood 亮版）
    ctx.fillStyle = '#9B2A2A';
    ctx.beginPath();
    ctx.ellipse(x - 13, y - 8.5, 6, 7.5, 0, 0, Math.PI * 2);
    ctx.ellipse(x + 13, y - 8.5, 6, 7.5, 0, 0, Math.PI * 2);
    ctx.fill();

    // 眼睛高光（灰燼橘 --warning）
    ctx.fillStyle = '#C44B1A';
    ctx.beginPath();
    ctx.ellipse(x - 13, y - 10, 4, 5, 0, 0, Math.PI * 2);
    ctx.ellipse(x + 13, y - 10, 4, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // 鼻孔
    ctx.fillStyle = '#220000';
    ctx.fillRect(x - 5, y + 2, 4, 5);
    ctx.fillRect(x + 1, y + 2, 4, 5);

    // 牙齒（大型鋸齒）
    ctx.fillStyle = '#E8DCC4';   // ink（骨粉牙齒）
    ctx.strokeStyle = '#7A6A52'; // muted
    ctx.lineWidth = 1;
    for (let i = -3; i <= 2; i++) {
      ctx.fillRect(x + i * 8 - 1, y + 14, 6, 10);
      ctx.strokeRect(x + i * 8 - 1, y + 14, 6, 10);
    }

    // 聖物金骷髏王冠（--xp-glow，無 shadowBlur）
    ctx.fillStyle = '#C8941A';
    ctx.strokeStyle = '#A07010';
    ctx.lineWidth = 2;
    ctx.beginPath();
    // 王冠底部
    ctx.moveTo(x - r + 5, y - r + 5);
    ctx.lineTo(x + r - 5, y - r + 5);
    ctx.lineTo(x + r - 5, y - r - 10);
    // 五個齒
    const crownW = (r - 5) * 2;
    const cx0 = x - r + 5;
    for (let i = 0; i <= 4; i++) {
      const tx = cx0 + (crownW / 4) * i;
      if (i % 2 === 0) {
        ctx.lineTo(tx, y - r - 28);
      } else {
        ctx.lineTo(tx, y - r - 10);
      }
    }
    ctx.lineTo(x - r + 5, y - r - 10);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // 王冠寶石（blood 紅，符合設計系統）
    ctx.fillStyle = '#7B1A1A';
    ctx.strokeStyle = '#C44B1A';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(x, y - r - 25, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#C44B1A';   // warning highlight
    ctx.beginPath();
    ctx.arc(x - 2, y - r - 27, 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

const grassOffsets = [];
for (let i = 0; i < 200; i++) {
  grassOffsets.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    len: 5 + Math.random() * 8,
    angle: -Math.PI * 0.4 + Math.random() * 0.8,
    alpha: 0.2 + Math.random() * 0.3
  });
}

function drawBackground() {
  ctx.fillStyle = '#1A1612';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = 'rgba(122, 106, 82, 0.18)';
  ctx.lineWidth = 1;
  for (let x = 0; x < canvas.width;  x += 50) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += 50) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }

  ctx.lineWidth = 1;
  for (const g of grassOffsets) {
    ctx.strokeStyle = `rgba(50, 140, 50, ${g.alpha})`;
    ctx.beginPath();
    ctx.moveTo(g.x, g.y);
    ctx.lineTo(g.x + Math.cos(g.angle) * g.len, g.y + Math.sin(g.angle) * g.len);
    ctx.stroke();
  }
}

// ─────────────────────────────────────────
// HUD 介面（V2 擴充）
// ─────────────────────────────────────────
function drawHUD() {
  // ── HP bar（尖角 + woodblock offset shadow）──
  ctx.fillStyle = 'rgba(26, 22, 18, 0.5)';
  ctx.fillRect(12, 12, 180, 34);
  ctx.fillStyle = COLORS.surface;
  ctx.fillRect(10, 10, 180, 34);

  const hpRatio = player.hp / player.maxHp;
  const hpColor = hpRatio > 0.3 ? COLORS.blood : COLORS.warning;
  ctx.fillStyle = hpColor;
  ctx.fillRect(14, 14, 172 * hpRatio, 26);

  ctx.strokeStyle = COLORS.muted;
  ctx.lineWidth = 1;
  ctx.strokeRect(10, 10, 180, 34);

  ctx.fillStyle = COLORS.ink;
  ctx.font = 'bold 14px "IM Fell English", serif';
  ctx.textAlign = 'left';
  ctx.fillText(`♥ ${player.hp} / ${player.maxHp}`, 20, 31);

  // ── 擊殺數面板（尖角 + offset shadow）──
  const killX = canvas.width / 2 - 80;
  ctx.fillStyle = 'rgba(26, 22, 18, 0.5)';
  ctx.fillRect(killX + 2, 10, 160, 36);
  ctx.fillStyle = COLORS.surface;
  ctx.fillRect(killX, 8, 160, 36);
  ctx.strokeStyle = COLORS.muted;
  ctx.lineWidth = 1;
  ctx.strokeRect(killX, 8, 160, 36);
  ctx.fillStyle = COLORS.xp;
  ctx.font = 'bold 22px "Pirata One", cursive';
  ctx.textAlign = 'center';
  ctx.fillText(`擊殺: ${killCount}`, canvas.width / 2, 33);

  // ── 右上資訊面板（整合：時間 / Lv / 敵人數 / 技能清單）──
  const alive = enemies.filter(e => !e.dead).length;
  const owned = Object.entries(player.skillLevels).filter(([, lv]) => lv > 0);
  const panelW = 178;
  const headerH = 86;             // 時間 + Lv/敵人 兩列
  const skillCols = 4;
  const skillCellW = 40, skillCellH = 36;
  const skillRows = Math.ceil(owned.length / skillCols);
  const skillH = owned.length > 0 ? skillRows * skillCellH + 22 : 0;
  const panelX = canvas.width - panelW - 10;
  const panelY = 8;
  const panelH = headerH + skillH + 8;

  // 面板背景（尖角 + offset shadow）
  ctx.fillStyle = 'rgba(26, 22, 18, 0.5)';
  ctx.fillRect(panelX + 2, panelY + 2, panelW, panelH);
  ctx.fillStyle = 'rgba(26, 22, 18, 0.78)';
  ctx.fillRect(panelX, panelY, panelW, panelH);
  ctx.strokeStyle = COLORS.muted;
  ctx.lineWidth = 1;
  ctx.strokeRect(panelX, panelY, panelW, panelH);

  // 時間（大字）— 大魔王登場時閃灰燼橘
  const timeStr = formatTime(getGameSeconds());
  const isBossTime = bossSpawned && !bossDefeated;
  if (isBossTime) {
    const pulse = 0.55 + Math.sin(frameCount * 0.12) * 0.35;
    ctx.fillStyle = `rgba(196, 75, 26, ${pulse * 0.4})`;
    ctx.fillRect(panelX + 6, panelY + 6, panelW - 12, 32);
  }
  ctx.fillStyle = isBossTime ? COLORS.warning : COLORS.ink;
  ctx.font = 'bold 22px "Pirata One", cursive';
  ctx.textAlign = 'center';
  ctx.fillText(`⏱ ${timeStr}`, panelX + panelW / 2, panelY + 30);

  // Lv 與 敵人數
  ctx.fillStyle = COLORS.xp;
  ctx.font = 'bold 14px "IM Fell English", serif';
  ctx.textAlign = 'left';
  ctx.fillText(`Lv.${level}`, panelX + 12, panelY + 58);
  ctx.fillStyle = COLORS.warning;
  ctx.font = 'bold 13px "IM Fell English", serif';
  ctx.textAlign = 'right';
  ctx.fillText(`敵人 ${alive}`, panelX + panelW - 12, panelY + 58);

  // 靜音圖示
  ctx.font = '14px "IM Fell English", serif';
  ctx.textAlign = 'left';
  ctx.fillStyle = bgmMuted ? COLORS.muted : COLORS.ink;
  ctx.fillText(bgmMuted ? '🔇 M' : '🎵 M', panelX + 12, panelY + 78);

  // 分隔線
  if (owned.length > 0) {
    ctx.strokeStyle = COLORS.muted;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(panelX + 8,  panelY + headerH);
    ctx.lineTo(panelX + panelW - 8, panelY + headerH);
    ctx.stroke();

    // 技能標題
    ctx.fillStyle = COLORS.muted;
    ctx.font = 'bold 11px "IM Fell English", serif';
    ctx.textAlign = 'right';
    ctx.fillText('技能', panelX + panelW - 12, panelY + headerH + 13);

    // 技能格子（尖角邊框）
    const gridY = panelY + headerH + 18;
    owned.forEach(([id, lv], i) => {
      const skill = SKILL_POOL.find(s => s.id === id);
      if (!skill) return;
      const col = i % skillCols, row = Math.floor(i / skillCols);
      const cx = panelX + 8 + col * skillCellW + skillCellW / 2;
      const cy = gridY + row * skillCellH;
      // 格子邊框
      ctx.strokeStyle = 'rgba(122, 106, 82, 0.4)';
      ctx.lineWidth = 1;
      ctx.strokeRect(cx - skillCellW / 2 + 4, cy - 4, skillCellW - 8, skillCellH - 4);
      ctx.fillStyle = COLORS.ink;
      ctx.font = '18px "IM Fell English", serif';
      ctx.textAlign = 'center';
      ctx.fillText(skill.icon, cx, cy + 14);
      ctx.fillStyle = COLORS.xp;
      ctx.font = 'bold 10px "IM Fell English", serif';
      ctx.fillText(`Lv${lv}`, cx, cy + 28);
    });
  }

  // ── EXP 經驗條（畫面底部）──
  const barH  = 26;
  const barY  = canvas.height - barH - 6;
  const barX  = 8;
  const barW  = canvas.width - 16;
  const expRatio = Math.min(exp / expToNext(level), 1); // 真實比例（顯示百分比用）
  const dr = expDisplayRatio; // 平滑動畫比例（繪製填充用）

  // 外框背景（尖角 + offset shadow）
  ctx.fillStyle = 'rgba(26, 22, 18, 0.5)';
  ctx.fillRect(barX + 2, barY + 2, barW, barH);
  ctx.fillStyle = COLORS.surface;
  ctx.fillRect(barX, barY, barW, barH);

  // 填充漸層（深聖物金 → 亮聖物金，保留進度光感）
  if (dr > 0) {
    const grad = ctx.createLinearGradient(barX, 0, barX + barW * dr, 0);
    grad.addColorStop(0, '#8A6010');
    grad.addColorStop(1, '#E8C44A');
    ctx.fillStyle = grad;
    ctx.fillRect(barX, barY, barW * dr, barH);
  }

  // 1px muted 邊框
  ctx.strokeStyle = COLORS.muted;
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, barH);

  // 快滿時 ink alpha pulse 邊框
  if (expRatio > 0.85) {
    const pulse = Math.sin(frameCount * 0.18) * 0.5 + 0.5;
    ctx.strokeStyle = `rgba(232, 220, 196, ${0.4 + pulse * 0.6})`;
    ctx.lineWidth = 2;
    ctx.strokeRect(barX, barY, barW, barH);
  }

  // Lv 標籤（左側）
  ctx.fillStyle = COLORS.xp;
  ctx.font = 'bold 13px "IM Fell English", serif';
  ctx.textAlign = 'left';
  ctx.fillText(`Lv.${level}`, barX + 10, barY + 17);

  // 百分比（置中）
  const pct = Math.round(expRatio * 100);
  ctx.fillStyle = COLORS.ink;
  ctx.font = 'bold 13px "IM Fell English", serif';
  ctx.textAlign = 'center';
  ctx.fillText(`${pct}%`, canvas.width / 2, barY + 17);

  // 下一級提示（右側）
  ctx.fillStyle = 'rgba(122, 106, 82, 0.85)';
  ctx.font = '11px "IM Fell English", serif';
  ctx.textAlign = 'right';
  ctx.fillText(`Lv.${level + 1} ▶`, barX + barW - 10, barY + 17);

  // 操作提示（更細小，放在 EXP 條下方邊緣）
  ctx.fillStyle = 'rgba(232, 220, 196, 0.25)';
  ctx.font = '10px "IM Fell English", serif';
  ctx.textAlign = 'left';
  ctx.fillText(isTouchDevice ? '左搖桿 移動  ·  右搖桿 武器方向' : 'WASD 移動  ·  滑鼠 控制方向', barX + 6, canvas.height - 1);
}

function drawBossHpBar() {
  const boss = enemies.find(e => e.type === 'boss' && !e.dead);
  if (!boss) return;

  const barH = 36;
  const barW = canvas.width - 40;
  const bx = 20, by = 12;
  const ratio = boss.hp / boss.maxHp;

  // 外框（offset shadow + bg）
  ctx.fillStyle = 'rgba(26, 22, 18, 0.6)';
  ctx.fillRect(bx - 1, by - 1, barW + 6, barH + 6);
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(bx - 3, by - 3, barW + 6, barH + 6);

  // 背景（深 blood）
  ctx.fillStyle = '#3A0808';
  ctx.fillRect(bx, by, barW, barH);

  // 血量（暗 blood → warning 漸層，保留 boss 危險強敵的進度感）
  const grad = ctx.createLinearGradient(bx, by, bx + barW * ratio, by);
  grad.addColorStop(0, COLORS.blood);
  grad.addColorStop(1, COLORS.warning);
  ctx.fillStyle = grad;
  ctx.fillRect(bx, by, barW * ratio, barH);

  // 邊框（1px warning 尖角）
  ctx.strokeStyle = COLORS.warning;
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, barW, barH);

  // 文字（描邊取代 shadowBlur）
  ctx.font = 'bold 14px "IM Fell English", serif';
  ctx.textAlign = 'center';
  ctx.lineWidth = 3;
  ctx.strokeStyle = COLORS.bg;
  ctx.strokeText(`☠ 骷髏大魔王  ${boss.hp} / ${boss.maxHp}`, canvas.width / 2, by + barH - 9);
  ctx.fillStyle = COLORS.ink;
  ctx.fillText(`☠ 骷髏大魔王  ${boss.hp} / ${boss.maxHp}`, canvas.width / 2, by + barH - 9);
}
