function spawnEnemy(forceType) {
  const type = forceType || getEnemyTypeByTime(); // V3：時間驅動類型
  enemies.push(new Enemy(type));
}

function getSpawnCount() {
  return Math.min(1 + Math.floor(killCount / 8), 4);
}

// ─────────────────────────────────────────
// 碰撞：圓 vs 圓
// ─────────────────────────────────────────
function circleCollide(ax, ay, ar, bx, by, br) {
  const dx = bx - ax, dy = by - ay;
  return Math.sqrt(dx * dx + dy * dy) < ar + br;
}

// ─────────────────────────────────────────
// 殺怪邏輯（統一處理 EXP + area_bomb + chain_slash）
// isPrimary: true = 刀刃直接命中（觸發 bomb/chain），false = 連鎖殺（不再觸發）
// ─────────────────────────────────────────
function killEnemy(e, isPrimary = true) {
  e.dead = true;
  killCount++;
  // V3：依怪物類型給分
  score += e.type === 'zombie' ? 2 : (e.type === 'elite_skeleton' ? 4 : (e.type === 'skeleton_archer' ? 3 : (e.type === 'boss' ? 100 : 1)));

  // 大魔王死亡處理
  if (e.type === 'boss') {
    if (!bossRevived) {
      // 第一次「死亡」→ 復活！恢復 50% 血量
      bossRevived = true;
      e.dead = false;       // 取消死亡標記
      e.hp = Math.ceil(e.maxHp * 0.5);
      e.hitCooldown = 60;   // 1 秒無敵幀，留給玩家反應
      e.flashTimer = 40;    // 白色閃爍表示復活
      killCount--;          // 撤銷計數
      score -= 100;         // 撤銷分數
      // 復活特效：中型粒子環 + 浮動文字
      for (let i = 0; i < 30; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.5 + Math.random() * 3;
        particles.push({
          x: e.x, y: e.y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 40 + Math.random() * 30,
          color: ['#7B1A1A','#C44B1A','#E8DCC4'][Math.floor(Math.random()*3)],
          radius: 3 + Math.random() * 4
        });
      }
      addFloatText(e.x, e.y - e.radius - 20, '☠ 復活！', '#C44B1A');
      SFX.bossHurt && SFX.bossHurt();
      return;
    }
    // 第二次真正死亡 → 破關
    bossDefeated = true;
    BGM.stop();
    // 壯觀的粒子爆炸
    for (let i = 0; i < 80; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 6;
      particles.push({
        x: e.x, y: e.y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 60 + Math.random() * 60,
        color: ['#C8941A','#C44B1A','#7B1A1A','#E8DCC4'][Math.floor(Math.random()*4)],
        radius: 4 + Math.random() * 5
      });
    }
    state = 'victory';
    return;
  }

  addBloodDecal(e.x, e.y, e.type);
  // XP 浮動文字：依怪物類型顯示實際經驗值與顏色
  const xpColors = {
    skeleton:        '#D4C8A8',   // 骨粉（骨骼色）
    zombie:          '#7A6A52',   // 蝕紙黃（muted）
    skeleton_archer: '#C8941A',   // 聖物金（遠程更值錢）
    elite_skeleton:  '#C8941A',   // 聖物金（精英）
  };
  const xpColor = xpColors[e.type] || '#C8941A';
  const xpLabel = e.expValue >= 4 ? `+${e.expValue} XP` : `+${e.expValue}`;
  if (e.type === 'skeleton') {
    addBoneFragments(e.x, e.y);
    addFloatText(e.x, e.y - e.radius - 5, xpLabel, xpColor);
  } else {
    addBloodSplatter(e.x, e.y);
    addFloatText(e.x, e.y - e.radius - 5, xpLabel, xpColor);
  }

  // EXP 寶石
  dropExpGem(e.x, e.y, e.expValue);

  if (!isPrimary) return; // 連鎖殺不再觸發以下效果
  SFX.play('slash');

  // area_bomb：刀刃命中才觸發
  if (player.areaBombRadius > 0) {
    for (const other of enemies) {
      if (!other.dead && circleCollide(e.x, e.y, player.areaBombRadius, other.x, other.y, other.radius)) {
        killEnemy(other, false); // false = 連鎖殺
      }
    }
    // 爆炸視覺
    addParticles(e.x, e.y, '#C44B1A', 12);   // warning
    addFloatText(e.x, e.y - 20, '✦', '#C8941A');  // xp-glow，無 emoji
  }

  // chain_slash：刀刃命中才觸發（V3：stormChain 加倍半徑）
  if (player.chainSlashLevel > 0) {
    const baseRadius = CHAIN_RADII[Math.min(player.chainSlashLevel - 1, 2)];
    const chainRadius = player.stormChainActive ? baseRadius * 2 : baseRadius;
    for (const other of enemies) {
      if (!other.dead && circleCollide(e.x, e.y, chainRadius, other.x, other.y, other.radius)) {
        killEnemy(other, false); // false = 連鎖殺
      }
    }
  }
}

// ─────────────────────────────────────────
// 遊戲初始化 / 重置
// ─────────────────────────────────────────
// 觸控裝置：嘗試進入全螢幕並鎖定橫向（Android Chrome 有效；iOS 不支援會 silent fail）
async function tryLockLandscape() {
  if (!isTouchDevice) return;
  try {
    if (document.documentElement.requestFullscreen && !document.fullscreenElement) {
      await document.documentElement.requestFullscreen();
    }
    if (screen.orientation && screen.orientation.lock) {
      await screen.orientation.lock('landscape');
    }
  } catch (e) {
    // iOS / 不支援的瀏覽器會 reject，無妨 — CSS 旋轉提示遮罩會接手
  }
}

function startGame() {
  state = 'playing';
  resetGame();
  BGM.start();
  tryLockLandscape();
}

function resetGame() {
  player.x = canvas.width / 2;
  player.y = canvas.height / 2;
  player.invincible = 0;
  player.bladeSpinAngle = 0;

  // 技能效果屬性完整歸零（工程審查補充）
  player.speed        = 3.2;
  player.bladeRadius  = 55;
  player.bladeArc     = Math.PI * 0.55;
  player.magnetRange  = 80;
  player.maxHp        = 5;
  player.hp           = 5;
  player.skillLevels  = {};
  player.ghostOrbLevel  = 0;
  player.ghostOrbTimer  = 0;
  player.areaBombRadius = 0;
  player.chainSlashLevel = 0;

  score = 0;
  killCount = 0;
  frameCount = 0;
  spawnTimer = 0;
  spawnInterval = 110;

  exp = 0;
  level = 1;

  enemies = [];
  particles = [];
  floatTexts = [];
  bloodDecals = [];
  expGems = [];
  ghostOrbs = [];

  // V3 重置
  gameTime = 0;
  arrows = [];
  evolutionAnnouncements = [];
  player.evolutions = {};
  player.soulScytheActive = false;
  player.hellfireActive = false;
  player.stormChainActive = false;

  // 大魔王重置
  bossSpawned = false;
  bossDefeated = false;

  hideUpgradeMenu();

  for (let i = 0; i < 6; i++) spawnEnemy();
  state = 'playing';
  if (!BGM.isRunning()) BGM.start();
}

// ─────────────────────────────────────────
// 繪製 EXP 寶石
// ─────────────────────────────────────────
function drawExpGems() {
  for (const gem of expGems) {
    ctx.save();
    ctx.globalAlpha = 0.92;
    // 偏移陰影（woodblock 法，無 shadowBlur）
    ctx.fillStyle = 'rgba(26, 22, 18, 0.5)';
    ctx.beginPath();
    ctx.arc(gem.x + 1.5, gem.y + 1.5, 5, 0, Math.PI * 2);
    ctx.fill();
    // xp-glow 系列：大寶石聖物金，小寶石蝕紙黃
    const gemR = gem.value >= 4 ? 7 : (gem.value >= 2 ? 6 : 5);
    ctx.fillStyle = gem.value >= 4 ? '#C8941A' : (gem.value >= 2 ? '#A07010' : '#7A6A52');
    ctx.strokeStyle = '#1A1612';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(gem.x, gem.y, gemR, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // 高光點（左上角）
    ctx.fillStyle = gem.value >= 4 ? '#E8C44A' : '#B08828';
    ctx.beginPath();
    ctx.arc(gem.x - gemR * 0.3, gem.y - gemR * 0.35, gemR * 0.28, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ─────────────────────────────────────────
// 繪製鬼火彈丸
// ─────────────────────────────────────────
function drawGhostOrbs() {
  for (const orb of ghostOrbs) {
    const alpha = orb.life / orb.maxLife;
    // V3：業火進化 → 大火球 + 紅色
    const orbR     = player.hellfireActive ? 12 : 6;
    // 設計系統：業火 → warning(#C44B1A), 普通 → xp-glow(#C8941A)
    const orbColor = player.hellfireActive ? '#C44B1A' : '#C8941A';
    const orbDark  = player.hellfireActive ? '#7B1A1A' : '#A07010';
    ctx.save();
    ctx.globalAlpha = alpha;
    // 偏移陰影（woodblock，無 shadowBlur）
    ctx.fillStyle = 'rgba(26, 22, 18, 0.45)';
    ctx.beginPath();
    ctx.arc(orb.x + 1.5, orb.y + 1.5, orbR, 0, Math.PI * 2);
    ctx.fill();
    // 主體
    ctx.fillStyle = orbDark;
    ctx.beginPath();
    ctx.arc(orb.x, orb.y, orbR, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = orbColor;
    ctx.beginPath();
    ctx.arc(orb.x - orbR * 0.15, orb.y - orbR * 0.15, orbR * 0.7, 0, Math.PI * 2);
    ctx.fill();
    // 高光
    ctx.fillStyle = '#E8DCC4';
    ctx.globalAlpha = alpha * 0.6;
    ctx.beginPath();
    ctx.arc(orb.x - orbR * 0.3, orb.y - orbR * 0.3, orbR * 0.25, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ─────────────────────────────────────────
// 主遊戲迴圈
// ─────────────────────────────────────────
function gameLoop() {
  frameCount++;
  // 平滑 EXP 進度條（lerp 向真實比例靠近）
  const _expTarget = Math.min(exp / expToNext(level), 1);
  expDisplayRatio += (_expTarget - expDisplayRatio) * 0.08;

  // ── 更新 ──
  if (state === 'playing') {
    gameTime++; // V3：遊戲計時
    player.update();

    // 大魔王：遊戲 5 分鐘後（18000 frames = 300 秒 × 60fps）
    if (gameTime >= 10800 && !bossSpawned) {
      bossSpawned = true;
      spawnEnemy('boss');
      addFloatText(canvas.width / 2, canvas.height / 2 - 60, '☠ 大魔王降臨！', '#FF0000');
    }

    // 生怪（大魔王登場後停止普通生怪）
    if (!bossSpawned) {
      spawnTimer++;
      if (spawnTimer >= spawnInterval) {
        spawnTimer = 0;
        const n = getSpawnCount();
        for (let i = 0; i < n; i++) spawnEnemy();
        spawnInterval = Math.max(35, 110 - Math.floor(killCount / 5) * 4);
      }
    }

    // 更新敵人 + 碰撞
    for (const e of enemies) {
      e.update();

      if (!e.dead) {
        // 刀刃命中（V3：使用 takeDamage，支援多 HP 怪物）
        if (player.isInBladeZone(e.x, e.y, e.radius)) {
          if (e.takeDamage()) killEnemy(e, true); // 死亡才 killEnemy
        }
        // 被敵人撞到（非刀刃區）
        else if (circleCollide(player.x, player.y, player.radius, e.x, e.y, e.radius)) {
          if (player.takeDamage()) {
            addFloatText(player.x, player.y - 25, '-1', '#C44B1A');  // warning
            if (player.hp <= 0) { SFX.play('gameover'); state = 'gameover'; BGM.stop(); }
          }
        }
      }
    }

    // 清除已完成死亡動畫的敵人
    enemies = enemies.filter(e => !e.dead || e.deathTimer < 26);

    // 更新 EXP 寶石（lerp 吸取）
    for (const gem of expGems) {
      // 初速度衰減
      gem.vx *= 0.88;
      gem.vy *= 0.88;
      gem.x += gem.vx;
      gem.y += gem.vy;

      const dx = player.x - gem.x;
      const dy = player.y - gem.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < player.magnetRange && dist > 0.1) {
        gem.x += (dx / dist) * dist * 0.15;
        gem.y += (dy / dist) * dist * 0.15;
      }

      if (dist < 15) {
        exp += gem.value;
        gem.collected = true;
        SFX.play('gem');
        addFloatText(gem.x, gem.y - 10, `+${gem.value}`, '#C8941A');  // xp-glow
        checkLevelUp();
      }
    }
    expGems = expGems.filter(g => !g.collected);

    // 更新鬼火彈丸
    updateGhostOrbs();

    // V3：更新箭矢
    updateArrows();

    // 更新粒子
    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.92;
      p.vy *= 0.92;
      p.life--;
    }
    particles = particles.filter(p => p.life > 0);

    // 更新浮動文字
    for (const t of floatTexts) {
      t.y += t.vy;
      t.life--;
    }
    floatTexts = floatTexts.filter(t => t.life > 0);
  }

  // upgrade 狀態：一切凍結（敵人、寶石、鬼火），只重繪畫面
  // （canvas 繼續渲染，但不更新任何遊戲邏輯）

  // ── 繪製 ──
  drawBackground();

  for (const d of bloodDecals) {
    ctx.save();
    ctx.globalAlpha = d.alpha * 0.5;
    ctx.fillStyle = d.type === 'skeleton' ? '#9E9E8E' : '#4A2A2A';
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // EXP 寶石（在粒子下層）
  drawExpGems();

  // 粒子
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // 敵人
  for (const e of enemies) e.draw();

  if (state === 'playing' || state === 'upgrade' || state === 'gameover') {
    player.draw();
  }

  // 鬼火彈丸
  drawGhostOrbs();

  // V3：箭矢
  drawArrows();

  // 浮動文字
  for (const t of floatTexts) {
    ctx.save();
    ctx.globalAlpha = t.life / 50;
    ctx.fillStyle = t.color;
    ctx.strokeStyle = 'rgba(0,0,0,0.8)';
    ctx.lineWidth = 3;
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center';
    ctx.strokeText(t.text, t.x, t.y);
    ctx.fillText(t.text, t.x, t.y);
    ctx.restore();
  }

  if (state === 'playing' || state === 'upgrade') drawHUD();
  if (state === 'start')    drawStartScreen();
  if (state === 'gameover') { drawHUD(); drawGameOverScreen(); }
  if (state === 'victory')  { drawHUD(); drawVictoryScreen(); }

  updateJoystickVisibility();

  // 大魔王血量條（playing 狀態且大魔王出現時）
  if (state === 'playing' && bossSpawned && !bossDefeated) drawBossHpBar();

  // V3：武器進化公告（最上層）
  if (state === 'playing') drawEvolutionAnnouncements();

  requestAnimationFrame(gameLoop);
}

// ─────────────────────────────────────────
// 啟動
// ─────────────────────────────────────────
gameLoop();
</script>
